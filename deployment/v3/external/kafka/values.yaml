clusterDomain: cluster.local
logRetentionBytes: _1073741824
defaultReplicationFactor: 3
offsetsTopicReplicationFactor: 3
transactionStateLogReplicationFactor: 3
numPartitions: 20
replicaCount: 5
sidecars: {}
autoCreateTopicsEnable: true
# CAUTION: Option to delete topics should be disabled in production. 
deleteTopicEnable: true

heapOpts: "-Xmx2275m -Xms2275m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 8Gi

zookeeper:
  enabled: true
  resources:
    limits:
      cpu: 300m
      memory: 1200Mi
    requests:
      cpu: 150m
      memory: 600Mi    
  replicaCount: 5
  persistence:
    enabled: true
    size: 2Gi

resources:
  limits:
    cpu: "1"
    memory: 3500Mi
  requests: 
    cpu: 500m
    memory: 2500Mi

startupProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 30
  successThreshold: 1

